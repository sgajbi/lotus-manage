services:
  lotus-manage:
    build: .
    ports:
      - \"8140:8140\"
    env_file:
      - .env
    healthcheck:
      test: [\"CMD\", \"python\", \"-c\", \"import urllib.request; urllib.request.urlopen('http://localhost:8140/health/ready')\"]
      interval: 15s
      timeout: 3s
      retries: 10
